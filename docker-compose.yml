services:
  nginx:
    image: nginx:alpine
    container_name: alura-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./api:/var/www/api
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./api/storage:/var/www/api/storage
    depends_on:
      - app
    networks:
      - alura
    restart: unless-stopped

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: alura-app
    working_dir: /var/www/api
    volumes:
      - ./api:/var/www/api
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    env_file:
      - ./api/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_started
    networks:
      - alura
    restart: unless-stopped

  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: alura-horizon
    working_dir: /var/www/api
    command: php artisan horizon
    volumes:
      - ./api:/var/www/api
    env_file:
      - ./api/.env
    depends_on:
      - mysql
      - redis
      - opensearch
    networks:
      - alura
    restart: unless-stopped

  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: alura-scheduler
    working_dir: /var/www/api
    command: |
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./api:/var/www/api
    env_file:
      - ./api/.env
    depends_on:
      - mysql
      - redis
    networks:
      - alura
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: alura-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-alura_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-alura}
      MYSQL_USER: ${DB_USERNAME:-alura}
      MYSQL_PASSWORD: ${DB_PASSWORD:-alura_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - alura
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alura-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - alura
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: alura-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_SECURITY_PLUGIN=true"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - alura
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: alura-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    depends_on:
      - opensearch
    networks:
      - alura
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: alura-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - alura
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: alura-admin
    ports:
      - "5173:5173"
    volumes:
      - ./admin:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      - app
    networks:
      - alura
    restart: unless-stopped

  site:
    build:
      context: ./site
      dockerfile: Dockerfile
    container_name: alura-site
    ports:
      - "3000:3000"
    volumes:
      - ./site:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://nginx/api
      - WATCHPACK_POLLING=true
    depends_on:
      - nginx
    networks:
      - alura
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  opensearch_data:

networks:
  alura:
    driver: bridge
